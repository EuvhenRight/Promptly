openapi: 3.0.3
info:
  title: Promptly API
  description: REST API для маркетплейсу AI-промптів (Next.js, Firebase, Stripe).
  version: 1.0.0

servers:
  - url: /
    description: Поточний origin (той самий, що й фронт)

tags:
  - name: Checkout
    description: Stripe Checkout (оплата)
  - name: Purchase
    description: Покупка за кредитами
  - name: Categories
  - name: Tags
  - name: Types
  - name: Models
  - name: Search bar backgrounds

paths:
  /api/checkout:
    post:
      tags: [Checkout]
      summary: Створити Stripe Checkout Session (embedded)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [prompt, credits, plan, cart]
                userId:
                  type: string
                promptId:
                  type: string
                promptIds:
                  type: array
                  items: { type: string }
                title:
                  type: string
                price:
                  type: number
                description:
                  type: string
                image:
                  type: string
                credits:
                  type: integer
                  enum: [1000, 2000]
                plan:
                  type: string
                  enum: [starter, pro]
                billing:
                  type: string
                  enum: [monthly, yearly]
      responses:
        '200':
          description: Session створено
          content:
            application/json:
              schema:
                type: object
                properties:
                  clientSecret: { type: string }
                  currency: { type: string }
                  amountCents: { type: integer }
        '400':
          description: Невірні дані
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Firebase Admin недоступний

  /api/checkout/session-status:
    get:
      tags: [Checkout]
      summary: Статус сесії Stripe
      parameters:
        - name: session_id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  customer_email: { type: string, nullable: true }
        '400':
          description: Відсутній session_id
        '500':
          description: Помилка Stripe

  /api/checkout/fulfill:
    post:
      tags: [Checkout]
      summary: Виконати після успішної оплати (credits, prompts, cart)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [session_id]
              properties:
                session_id: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  granted: { type: array, items: { type: string } }
                  grantedCredits: { type: integer }
        '400':
          description: Відсутній session_id або оплата не завершена

  /api/purchase:
    post:
      tags: [Purchase]
      summary: Покупка промпту(ів) за кредитами
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [promptId]
                  properties:
                    promptId: { type: string }
                - type: object
                  required: [type, promptIds]
                  properties:
                    type: { type: string, enum: [cart] }
                    promptIds: { type: array, items: { type: string } }
      responses:
        '200':
          description: Успішно
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
        '400':
          description: Невірний body або недостатньо кредитів
        '401':
          description: Не авторизовано (Bearer token)

  /api/categories:
    get:
      tags: [Categories]
      summary: Список категорій (активні)
      responses:
        '200':
          description: Масив категорій
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CategoryItem' }
        '503':
          description: Firebase Admin не ініціалізовано
    post:
      tags: [Categories]
      summary: Створити категорію або seed (admin)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        '200':
          description: Створено
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  id: { type: string }
                  name: { type: string }

  /api/categories/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Categories]
      summary: Отримати категорію за id
    patch:
      tags: [Categories]
      summary: Оновити категорію
    delete:
      tags: [Categories]
      summary: Видалити категорію

  /api/tags:
    get:
      tags: [Tags]
      summary: Список тегів
    post:
      tags: [Tags]
      summary: Створити тег (admin)
  /api/tags/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Tags]
    patch:
      tags: [Tags]
    delete:
      tags: [Tags]

  /api/types:
    get:
      tags: [Types]
      summary: Список типів
    post:
      tags: [Types]
      summary: Створити тип (admin)
  /api/types/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Types]
    patch:
      tags: [Types]
    delete:
      tags: [Types]

  /api/models:
    get:
      tags: [Models]
      summary: Список моделей (активні)
      responses:
        '200':
          description: Масив моделей
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ModelItem' }
    post:
      tags: [Models]
      summary: Створити модель або seed (admin)
  /api/models/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Models]
    patch:
      tags: [Models]
    delete:
      tags: [Models]

  /api/search-bar-backgrounds:
    get:
      tags: [Search bar backgrounds]
      summary: Список фонів пошуку
      parameters:
        - name: active
          in: query
          schema: { type: string, enum: [true, false] }
      responses:
        '200':
          description: Масив або один активний (active=true)
    post:
      tags: [Search bar backgrounds]
      summary: Створити фон (admin)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [imageUrl]
              properties:
                imageUrl: { type: string }
                name: { type: string }
                isActive: { type: boolean }
  /api/search-bar-backgrounds/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Search bar backgrounds]
    patch:
      tags: [Search bar backgrounds]
    delete:
      tags: [Search bar backgrounds]
  /api/search-bar-backgrounds/upload:
    post:
      tags: [Search bar backgrounds]
      summary: Завантажити файл фону

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID token
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: string }
  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
    CategoryItem:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
    ModelItem:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
