# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure
#
# IMPORTANT: After adding a new secret reference below (e.g. STRIPE_SECRET_KEY),
# you must grant the backend access to it. This is a one-time setup per secret.
#
# Since you are using Studio, you must do this manually in the Google Cloud Console:
# 1. Go to IAM > Service Accounts and copy the email of the "App Hosting Backend" service account.
# 2. Go to Secret Manager, select the secret, and in PERMISSIONS, grant that email
#    the "Secret Manager Secret Accessor" role.
#
# If you had a local setup, you would run this command from your terminal:
# firebase apphosting:secrets:grantaccess YOUR_SECRET_NAME

runConfig:
  maxInstances: 1

env:
  - variable: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    value: pk_test_51Sv0wvLNMP4OpKJBDCBq1jlhUjUGAcTKzLaKmZ8FyR9AOtWJnnixDGjCBwiQRRHBDRrLQ0yc1Ly95UsiJRPLfkEZ005qrvaxAm
    availability:
      - BUILD
      - RUNTIME
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
    availability:
      - RUNTIME
  - variable: STRIPE_CURRENCY
    value: eur
    availability:
      - BUILD
      - RUNTIME
